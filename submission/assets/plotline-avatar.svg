<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="2048" viewBox="0 0 2048 2048">
  <defs>
    <!-- Cinematic midnight backdrop -->
    <radialGradient id="bg" cx="50%" cy="38%" r="85%">
      <stop offset="0%" stop-color="#1c2547"/>
      <stop offset="45%" stop-color="#111936"/>
      <stop offset="100%" stop-color="#070b1a"/>
    </radialGradient>
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="78%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.38"/>
    </linearGradient>
    <!-- Amber narrative line -->
    <linearGradient id="line" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#e08a2e"/>
      <stop offset="55%" stop-color="#f6ad55"/>
      <stop offset="100%" stop-color="#ffd98a"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="316" x2="0" y2="1900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f6ad55" stop-opacity="0.16"/>
      <stop offset="45%" stop-color="#f6ad55" stop-opacity="0.05"/>
      <stop offset="85%" stop-color="#f6ad55" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="peakGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe9bf" stop-opacity="0.85"/>
      <stop offset="35%" stop-color="#f6ad55" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#f6ad55" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <!-- Data-paper dot grid -->
    <pattern id="dots" width="88" height="88" patternUnits="userSpaceOnUse">
      <circle cx="44" cy="44" r="3" fill="#8ea2d8" opacity="0.10"/>
    </pattern>
  </defs>

  <!-- Backdrop -->
  <rect width="2048" height="2048" fill="url(#bg)"/>
  <rect width="2048" height="2048" fill="url(#dots)"/>

  <!-- Faint horizontal gridlines -->
  <g stroke="#9db1e8" stroke-width="2" opacity="0.05">
    <line x1="0" y1="392"  x2="2048" y2="392"/>
    <line x1="0" y1="704"  x2="2048" y2="704"/>
    <line x1="0" y1="1016" x2="2048" y2="1016"/>
    <line x1="0" y1="1328" x2="2048" y2="1328"/>
    <line x1="0" y1="1640" x2="2048" y2="1640"/>
  </g>

  <!-- Star specks: the cinematic sky -->
  <g fill="#dbe6ff">
    <circle cx="286"  cy="330"  r="5"   opacity="0.50"/>
    <circle cx="520"  cy="212"  r="3.5" opacity="0.34"/>
    <circle cx="812"  cy="388"  r="4"   opacity="0.42"/>
    <circle cx="1084" cy="196"  r="5.5" opacity="0.55"/>
    <circle cx="1318" cy="352"  r="3"   opacity="0.30"/>
    <circle cx="1564" cy="180"  r="4.5" opacity="0.46"/>
    <circle cx="1798" cy="318"  r="3.5" opacity="0.36"/>
    <circle cx="1936" cy="150"  r="3"   opacity="0.28"/>
    <circle cx="150"  cy="560"  r="3.5" opacity="0.30"/>
    <circle cx="676"  cy="120"  r="3"   opacity="0.26"/>
    <circle cx="1452" cy="520"  r="3"   opacity="0.26"/>
    <circle cx="960"  cy="560"  r="3.5" opacity="0.30"/>
  </g>

  <!-- Secondary teal storyline, behind -->
  <path d="M 0 1660 C 320 1600, 620 1668, 900 1500 S 1420 1210, 1700 1120 S 1960 1052, 2048 1030"
        fill="none" stroke="#4fd1c5" stroke-width="9" opacity="0.30" stroke-linecap="round"/>
  <path d="M 0 1660 C 320 1600, 620 1668, 900 1500 S 1420 1210, 1700 1120 S 1960 1052, 2048 1030"
        fill="none" stroke="#4fd1c5" stroke-width="9" opacity="0.22" filter="url(#softGlow)"/>

  <!-- Area under the main plotline (extends past canvas so no hard edges) -->
  <path d="M -20 1444 L 128 1408 L 448 1330 L 736 1444 L 1024 1156 L 1312 1006 L 1600 742 L 1888 468 L 2068 296
           L 2068 2068 L -20 2068 Z" fill="url(#area)"/>

  <!-- Main plotline: glow pass, then crisp pass -->
  <path d="M 128 1408 L 448 1330 L 736 1444 L 1024 1156 L 1312 1006 L 1600 742 L 1888 468"
        fill="none" stroke="#f6ad55" stroke-width="30" stroke-linejoin="round" stroke-linecap="round"
        opacity="0.55" filter="url(#glow)"/>
  <path d="M 128 1408 L 448 1330 L 736 1444 L 1024 1156 L 1312 1006 L 1600 742 L 1888 468"
        fill="none" stroke="url(#line)" stroke-width="16" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Story-beat nodes -->
  <g>
    <circle cx="128"  cy="1408" r="40" fill="#f6ad55" opacity="0.14"/>
    <circle cx="128"  cy="1408" r="17" fill="#0d1430" stroke="#f6ad55" stroke-width="8"/>
    <circle cx="448"  cy="1330" r="40" fill="#f6ad55" opacity="0.14"/>
    <circle cx="448"  cy="1330" r="17" fill="#0d1430" stroke="#f6ad55" stroke-width="8"/>
    <circle cx="736"  cy="1444" r="40" fill="#f6ad55" opacity="0.14"/>
    <circle cx="736"  cy="1444" r="17" fill="#0d1430" stroke="#f6ad55" stroke-width="8"/>
    <circle cx="1024" cy="1156" r="40" fill="#f6ad55" opacity="0.14"/>
    <circle cx="1024" cy="1156" r="17" fill="#0d1430" stroke="#f6ad55" stroke-width="8"/>
    <circle cx="1312" cy="1006" r="40" fill="#f6ad55" opacity="0.14"/>
    <circle cx="1312" cy="1006" r="17" fill="#0d1430" stroke="#f6ad55" stroke-width="8"/>
    <circle cx="1600" cy="742"  r="40" fill="#f6ad55" opacity="0.14"/>
    <circle cx="1600" cy="742"  r="17" fill="#0d1430" stroke="#f6ad55" stroke-width="8"/>
  </g>

  <!-- The climax: radiant peak node with four-point sparkle -->
  <circle cx="1888" cy="468" r="230" fill="url(#peakGlow)"/>
  <circle cx="1888" cy="468" r="64" fill="none" stroke="#ffd98a" stroke-width="4" opacity="0.45"/>
  <circle cx="1888" cy="468" r="26" fill="#ffe9bf"/>
  <circle cx="1888" cy="468" r="26" fill="none" stroke="#f6ad55" stroke-width="8"/>
  <g fill="#fff3da" opacity="0.95">
    <path d="M 1888 300 L 1906 450 L 1888 500 L 1870 450 Z"/>
    <path d="M 1888 636 L 1906 486 L 1888 436 L 1870 486 Z"/>
    <path d="M 1720 468 L 1870 486 L 1920 468 L 1870 450 Z" opacity="0.85"/>
    <path d="M 2048 468 L 1906 486 L 1856 468 L 1906 450 Z" opacity="0.85"/>
  </g>

  <!-- Bottom cinematic vignette -->
  <rect width="2048" height="2048" fill="url(#vignette)"/>
</svg>
