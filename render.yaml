services:
  - type: web
    name: plotline
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PUBLIC_BASE_URL
        sync: false # set to https://<your-service>.onrender.com after first deploy
      - key: X402_MODE
        value: free
      - key: FREE_DAILY
        value: "50"
